<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker — Saksham Gupta</title>
    <meta name="description" content="Play Brick Breaker on Saksham Gupta's portfolio. A retro arcade game built with vanilla JavaScript and Google's signature color palette.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* CRT scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(255,255,255,0.02) 0px,
                rgba(255,255,255,0.02) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 100;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .title-bar {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .title {
            font-family: 'Press Start 2P', monospace;
            font-size: 22px;
            letter-spacing: 4px;
        }
        .title .t1 { color: #4285F4; }
        .title .t2 { color: #EA4335; }
        .title .t3 { color: #FBBC04; }
        .title .t4 { color: #34A853; }

        .google-dots {
            display: flex;
            gap: 4px;
        }
        .google-dots span {
            width: 6px; height: 6px;
            display: inline-block;
        }
        .google-dots .d1 { background: #4285F4; }
        .google-dots .d2 { background: #EA4335; }
        .google-dots .d3 { background: #FBBC04; }
        .google-dots .d4 { background: #34A853; }

        .game-container {
            position: relative;
            border: 2px solid #1a1f2e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow:
                0 0 30px rgba(66, 133, 244, 0.1),
                0 0 60px rgba(66, 133, 244, 0.05);
        }

        canvas {
            display: block;
            background: #0d1117;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            padding: 0 4px;
        }

        .hud-item {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            letter-spacing: 1px;
        }
        .hud-label { color: #5f6368; }
        .hud-value { color: #4285F4; margin-left: 6px; }
        .hud-value.red { color: #EA4335; }
        .hud-value.green { color: #34A853; }
        .hud-value.yellow { color: #FBBC04; }

        .controls-hint {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: #333;
            letter-spacing: 1px;
            text-align: center;
        }
        .controls-hint span { color: #5f6368; }

        .back-link {
            position: fixed;
            top: 16px;
            left: 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #5f6368;
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #4285F4; }

        .credit {
            position: fixed;
            bottom: 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            color: #222;
            letter-spacing: 2px;
        }

        /* Overlay screens */
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 10, 0.92);
            z-index: 10;
            gap: 20px;
            transition: opacity 0.3s;
        }
        .overlay.hidden { opacity: 0; pointer-events: none; }

        .overlay h2 {
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            letter-spacing: 3px;
        }
        .overlay p {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #5f6368;
            letter-spacing: 1px;
            animation: blink 1.2s steps(1) infinite;
        }
        .overlay .final-score {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            color: #FBBC04;
            letter-spacing: 2px;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Mobile touch controls */
        .touch-controls {
            display: none;
            gap: 20px;
            margin-top: 8px;
        }
        .touch-btn {
            width: 64px; height: 48px;
            background: #1a1f2e;
            border: 1px solid #2a2f3e;
            border-radius: 8px;
            color: #5f6368;
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.1s;
        }
        .touch-btn:active { background: #2a3040; }

        @media (hover: none) and (pointer: coarse) {
            .touch-controls { display: flex; }
            .controls-hint { display: none; }
        }
    </style>
</head>
<body>

<a href="https://saksham-gupta-gh.github.io/" class="back-link">← PORTFOLIO</a>

<div class="game-wrapper">
    <div class="title-bar">
        <div class="title">
            <span class="t1">B</span><span class="t2">R</span><span class="t3">I</span><span class="t4">C</span><span class="t1">K</span>
            <span class="t2">B</span><span class="t3">R</span><span class="t4">E</span><span class="t1">A</span><span class="t2">K</span><span class="t3">E</span><span class="t4">R</span>
        </div>
        <div class="google-dots">
            <span class="d1"></span><span class="d2"></span><span class="d3"></span><span class="d4"></span>
        </div>
    </div>

    <div class="hud">
        <div class="hud-item"><span class="hud-label">SCORE</span><span class="hud-value" id="score-display">0000</span></div>
        <div class="hud-item"><span class="hud-label">LEVEL</span><span class="hud-value red" id="level-display">01</span></div>
        <div class="hud-item"><span class="hud-label">LIVES</span><span class="hud-value green" id="lives-display">♥♥♥</span></div>
        <div class="hud-item"><span class="hud-label">HIGH</span><span class="hud-value yellow" id="high-display">0000</span></div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="400"></canvas>

        <div class="overlay" id="start-screen">
            <h2><span style="color:#4285F4">BRICK</span> <span style="color:#EA4335">BREAKER</span></h2>
            <div class="google-dots" style="gap:6px">
                <span class="d1" style="width:8px;height:8px"></span>
                <span class="d2" style="width:8px;height:8px"></span>
                <span class="d3" style="width:8px;height:8px"></span>
                <span class="d4" style="width:8px;height:8px"></span>
            </div>
            <p>PRESS SPACE OR TAP TO START</p>
        </div>

        <div class="overlay hidden" id="game-over-screen">
            <h2 style="color:#EA4335">GAME OVER</h2>
            <div class="final-score" id="final-score">SCORE: 0000</div>
            <p>PRESS SPACE OR TAP TO RESTART</p>
        </div>

        <div class="overlay hidden" id="win-screen">
            <h2 style="color:#34A853">LEVEL CLEAR!</h2>
            <div class="final-score" id="win-score">SCORE: 0000</div>
            <p>PRESS SPACE OR TAP FOR NEXT LEVEL</p>
        </div>
    </div>

    <div class="controls-hint">
        <span>←</span> / <span>→</span> MOVE &nbsp;&nbsp; <span>SPACE</span> LAUNCH
    </div>

    <div class="touch-controls">
        <button class="touch-btn" id="btn-left">◀</button>
        <button class="touch-btn" id="btn-launch">▲</button>
        <button class="touch-btn" id="btn-right">▶</button>
    </div>
</div>

<div class="credit">BUILT BY SAKSHAM GUPTA · 2026</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Google palette
const BLUE = '#4285F4';
const RED = '#EA4335';
const YELLOW = '#FBBC04';
const GREEN = '#34A853';
const COLORS = [BLUE, RED, YELLOW, GREEN, '#5e97f6', '#e57368', '#fdd663', '#57bb6a'];
const BG = '#0d1117';
const GRID_COLOR = 'rgba(66, 133, 244, 0.04)';

// Game state
let state = 'start'; // start, playing, paused, gameover, win
let score = 0;
let lives = 3;
let level = 1;
let highScore = parseInt(localStorage.getItem('bb_high') || '0');
let particles = [];
let shakeTimer = 0;

// Paddle
const paddle = { w: 90, h: 12, x: 0, y: 0, speed: 7, color: BLUE };

// Ball
const ball = { x: 0, y: 0, dx: 0, dy: 0, r: 5, speed: 4.5, attached: true, color: '#fff' };

// Bricks
let bricks = [];
const brickRows = 5;
const brickCols = 10;
const brickW = 54;
const brickH = 18;
const brickPad = 4;
const brickOffsetTop = 40;
const brickOffsetLeft = 0;

// Input
let keys = {};
let touchLeft = false, touchRight = false;

function initPaddle() {
    paddle.x = canvas.width / 2 - paddle.w / 2;
    paddle.y = canvas.height - 30;
}

function initBall() {
    ball.attached = true;
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 1;
    ball.dx = 0;
    ball.dy = 0;
}

function launchBall() {
    if (!ball.attached) return;
    ball.attached = false;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
    const spd = ball.speed + (level - 1) * 0.3;
    ball.dx = Math.cos(angle) * spd;
    ball.dy = Math.sin(angle) * spd;
}

function createBricks() {
    bricks = [];
    const totalW = brickCols * (brickW + brickPad) - brickPad;
    const offsetX = (canvas.width - totalW) / 2;

    for (let r = 0; r < brickRows; r++) {
        for (let c = 0; c < brickCols; c++) {
            const hp = brickRows - r <= level ? Math.min(r < 2 ? 2 : 1, level) : 1;
            bricks.push({
                x: offsetX + c * (brickW + brickPad),
                y: brickOffsetTop + r * (brickH + brickPad),
                w: brickW,
                h: brickH,
                color: COLORS[(r + c) % COLORS.length],
                alive: true,
                hp: hp,
                maxHp: hp
            });
        }
    }
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            dx: (Math.random() - 0.5) * 6,
            dy: (Math.random() - 0.5) * 6,
            life: 1,
            decay: 0.02 + Math.random() * 0.03,
            size: 2 + Math.random() * 3,
            color
        });
    }
}

function resetGame() {
    score = 0;
    lives = 3;
    level = 1;
    paddle.w = 90;
    ball.speed = 4.5;
    initPaddle();
    initBall();
    createBricks();
    updateHUD();
}

function nextLevel() {
    level++;
    ball.speed += 0.3;
    paddle.w = Math.max(60, paddle.w - 5);
    initPaddle();
    initBall();
    createBricks();
    updateHUD();
    state = 'playing';
}

function updateHUD() {
    document.getElementById('score-display').textContent = String(score).padStart(4, '0');
    document.getElementById('level-display').textContent = String(level).padStart(2, '0');
    document.getElementById('lives-display').textContent = '♥'.repeat(lives) + '♡'.repeat(3 - lives);
    document.getElementById('high-display').textContent = String(highScore).padStart(4, '0');
}

// Drawing
function drawGrid() {
    ctx.strokeStyle = GRID_COLOR;
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 30) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 30) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
}

function drawBrick(b) {
    if (!b.alive) return;
    const alpha = b.hp / b.maxHp;
    ctx.fillStyle = b.color;
    ctx.globalAlpha = 0.3 + 0.7 * alpha;
    // Main body
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // Highlight (top-left bevel)
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(b.x, b.y, b.w, 3);
    ctx.fillRect(b.x, b.y, 3, b.h);
    // Shadow (bottom-right)
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(b.x, b.y + b.h - 2, b.w, 2);
    ctx.fillRect(b.x + b.w - 2, b.y, 2, b.h);
    ctx.globalAlpha = 1;
}

function drawPaddle() {
    // Glow
    ctx.shadowColor = paddle.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = paddle.color;
    // Rounded rect
    const r = 4;
    ctx.beginPath();
    ctx.moveTo(paddle.x + r, paddle.y);
    ctx.lineTo(paddle.x + paddle.w - r, paddle.y);
    ctx.quadraticCurveTo(paddle.x + paddle.w, paddle.y, paddle.x + paddle.w, paddle.y + r);
    ctx.lineTo(paddle.x + paddle.w, paddle.y + paddle.h - r);
    ctx.quadraticCurveTo(paddle.x + paddle.w, paddle.y + paddle.h, paddle.x + paddle.w - r, paddle.y + paddle.h);
    ctx.lineTo(paddle.x + r, paddle.y + paddle.h);
    ctx.quadraticCurveTo(paddle.x, paddle.y + paddle.h, paddle.x, paddle.y + paddle.h - r);
    ctx.lineTo(paddle.x, paddle.y + r);
    ctx.quadraticCurveTo(paddle.x, paddle.y, paddle.x + r, paddle.y);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(paddle.x + 4, paddle.y + 2, paddle.w - 8, 3);
}

function drawBall() {
    // Trail
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.arc(ball.x - ball.dx * 0.5, ball.y - ball.dy * 0.5, ball.r * 0.8, 0, Math.PI * 2); ctx.fill();
    // Glow
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 10;
    ctx.fillStyle = ball.color;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(ball.x - 1, ball.y - 1, ball.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
}

function drawParticles() {
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });
    ctx.globalAlpha = 1;
}

// Physics
function update() {
    if (state !== 'playing') return;

    // Paddle movement
    let pdx = 0;
    if (keys['ArrowLeft'] || keys['a'] || touchLeft) pdx = -paddle.speed;
    if (keys['ArrowRight'] || keys['d'] || touchRight) pdx = paddle.speed;
    paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x + pdx));

    // Attached ball follows paddle
    if (ball.attached) {
        ball.x = paddle.x + paddle.w / 2;
        ball.y = paddle.y - ball.r - 1;
        return;
    }

    // Ball movement
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Wall collisions
    if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
    if (ball.x + ball.r >= canvas.width) { ball.x = canvas.width - ball.r; ball.dx = -Math.abs(ball.dx); }
    if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }

    // Ball falls below
    if (ball.y + ball.r > canvas.height + 10) {
        lives--;
        shakeTimer = 10;
        if (lives <= 0) {
            state = 'gameover';
            if (score > highScore) { highScore = score; localStorage.setItem('bb_high', highScore); }
            document.getElementById('final-score').textContent = 'SCORE: ' + String(score).padStart(4, '0');
            document.getElementById('game-over-screen').classList.remove('hidden');
        } else {
            initBall();
        }
        updateHUD();
        return;
    }

    // Paddle collision
    if (
        ball.dy > 0 &&
        ball.y + ball.r >= paddle.y &&
        ball.y + ball.r <= paddle.y + paddle.h + 4 &&
        ball.x >= paddle.x - 2 &&
        ball.x <= paddle.x + paddle.w + 2
    ) {
        // Calculate bounce angle based on where ball hits paddle
        const hitPos = (ball.x - paddle.x) / paddle.w; // 0 to 1
        const angle = (hitPos - 0.5) * Math.PI * 0.7 - Math.PI / 2;
        const spd = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
        ball.dx = Math.cos(angle) * spd;
        ball.dy = Math.sin(angle) * spd;
        ball.y = paddle.y - ball.r - 1;
        spawnParticles(ball.x, ball.y, BLUE, 4);
    }

    // Brick collisions
    bricks.forEach(b => {
        if (!b.alive) return;
        if (
            ball.x + ball.r > b.x &&
            ball.x - ball.r < b.x + b.w &&
            ball.y + ball.r > b.y &&
            ball.y - ball.r < b.y + b.h
        ) {
            b.hp--;
            if (b.hp <= 0) {
                b.alive = false;
                score += 10 * level;
                spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 10);
            } else {
                spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 4);
            }

            // Determine bounce direction
            const overlapLeft = (ball.x + ball.r) - b.x;
            const overlapRight = (b.x + b.w) - (ball.x - ball.r);
            const overlapTop = (ball.y + ball.r) - b.y;
            const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
            const minOverlapX = Math.min(overlapLeft, overlapRight);
            const minOverlapY = Math.min(overlapTop, overlapBottom);

            if (minOverlapX < minOverlapY) {
                ball.dx = -ball.dx;
            } else {
                ball.dy = -ball.dy;
            }

            updateHUD();
        }
    });

    // Check win
    if (bricks.every(b => !b.alive)) {
        state = 'win';
        if (score > highScore) { highScore = score; localStorage.setItem('bb_high', highScore); }
        document.getElementById('win-score').textContent = 'SCORE: ' + String(score).padStart(4, '0');
        document.getElementById('win-screen').classList.remove('hidden');
        updateHUD();
    }

    // Update particles
    particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.1; // gravity
        p.life -= p.decay;
    });
    particles = particles.filter(p => p.life > 0);

    // Shake decay
    if (shakeTimer > 0) shakeTimer--;
}

function draw() {
    ctx.save();

    // Screen shake
    if (shakeTimer > 0) {
        const shakeX = (Math.random() - 0.5) * 6;
        const shakeY = (Math.random() - 0.5) * 6;
        ctx.translate(shakeX, shakeY);
    }

    // Clear
    ctx.fillStyle = BG;
    ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);

    // Grid
    drawGrid();

    // Bricks
    bricks.forEach(drawBrick);

    // Paddle
    drawPaddle();

    // Ball
    drawBall();

    // Particles
    drawParticles();

    ctx.restore();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Input handlers
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        handleAction();
    }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch/click for start/restart
canvas.addEventListener('click', handleAction);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleAction(); }, { passive: false });

function handleAction() {
    if (state === 'start') {
        state = 'playing';
        document.getElementById('start-screen').classList.add('hidden');
        resetGame();
    } else if (state === 'playing') {
        launchBall();
    } else if (state === 'gameover') {
        document.getElementById('game-over-screen').classList.add('hidden');
        state = 'playing';
        resetGame();
    } else if (state === 'win') {
        document.getElementById('win-screen').classList.add('hidden');
        nextLevel();
    }
}

// Mobile touch controls
const btnLeft = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');
const btnLaunch = document.getElementById('btn-launch');

btnLeft.addEventListener('touchstart', e => { e.preventDefault(); touchLeft = true; });
btnLeft.addEventListener('touchend', e => { touchLeft = false; });
btnRight.addEventListener('touchstart', e => { e.preventDefault(); touchRight = true; });
btnRight.addEventListener('touchend', e => { touchRight = false; });
btnLaunch.addEventListener('touchstart', e => { e.preventDefault(); handleAction(); });

// Init
initPaddle();
initBall();
createBricks();
updateHUD();
gameLoop();
</script>

</body>
</html>
